<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" type="text/css" href="login_style.css"/>
</head>

<body>

<div id="login-container">

    <h2>Login</h2>

    <input
        id="username"
        type="text"
        placeholder="Username"
    >

    <input
        id="password"
        type="password"
        placeholder="Password"
    >

    <button id="login-button">
        Login
    </button>

    <div id="login-error"></div>

</div>

<script src="login.js"></script>

</body>
